<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>작혼 타패성향 32유형 분석기</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=IBM+Plex+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root{
  --felt:#123B2F;
  --felt-deep:#0C2B22;
  --ivory:#F7F2E5;
  --ivory-side:#DCD2BC;
  --ink:#23312B;
  --red:#B33A2F;
  --green:#2F7D4F;
  --gold:#C9A227;
  --muted:#7C8A82;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'IBM Plex Sans KR',sans-serif;
  background:
    radial-gradient(ellipse at 50% -10%, #1B5A45 0%, var(--felt) 55%, var(--felt-deep) 100%);
  color:var(--ivory);
  min-height:100vh;
  padding:28px 16px 64px;
}
.wrap{max-width:560px;margin:0 auto}
header{text-align:center;margin-bottom:26px}
.eyebrow{
  display:inline-block;font-size:12px;letter-spacing:.35em;color:var(--gold);
  border-top:1px solid var(--gold);border-bottom:1px solid var(--gold);
  padding:4px 10px 3px 13px;margin-bottom:12px;
}
h1{
  font-family:'Black Han Sans',sans-serif;font-weight:400;
  font-size:clamp(30px,8vw,42px);line-height:1.15;letter-spacing:.02em;
}
h1 .accent{color:var(--gold)}
.sub{margin-top:8px;font-size:13.5px;color:#BFCFC6;line-height:1.6}

/* 모드 토글 */
.mode{display:flex;gap:10px;margin:22px 0 18px}
.mode button{
  flex:1;padding:13px 0;border:none;border-radius:8px;cursor:pointer;
  font-family:'Black Han Sans',sans-serif;font-size:17px;letter-spacing:.05em;
  background:var(--ivory);color:var(--ink);
  box-shadow:0 4px 0 var(--ivory-side),0 7px 12px rgba(0,0,0,.35);
  transition:transform .08s, box-shadow .08s, opacity .15s;
  opacity:.55;
}
.mode button.on{
  opacity:1;color:var(--red);
  transform:translateY(2px);
  box-shadow:0 2px 0 var(--ivory-side),0 4px 8px rgba(0,0,0,.3);
}
.mode button:focus-visible{outline:3px solid var(--gold);outline-offset:2px}

/* 입력 타일 */
form{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.field{
  background:var(--ivory);border-radius:10px;padding:12px 12px 10px;
  box-shadow:0 4px 0 var(--ivory-side),0 6px 10px rgba(0,0,0,.28);
  color:var(--ink);
}
.field.optional{background:#EFE9D8}
.field label{display:block;font-size:12.5px;font-weight:700;margin-bottom:5px}
.field label small{font-weight:400;color:var(--muted)}
.field .row{display:flex;align-items:baseline;gap:6px}
.field input{
  width:100%;border:none;background:transparent;color:var(--ink);
  font-family:'Black Han Sans',sans-serif;font-size:24px;letter-spacing:.02em;
  outline:none;
}
.field input:focus-visible{border-bottom:2px solid var(--red)}
.field .unit{font-size:13px;color:var(--muted);flex-shrink:0}
.opt-note{grid-column:1/-1;font-size:12px;color:#A9BCB2;margin-top:-2px}

.go{
  grid-column:1/-1;margin-top:10px;padding:16px 0;border:none;border-radius:10px;cursor:pointer;
  font-family:'Black Han Sans',sans-serif;font-size:21px;letter-spacing:.14em;
  background:var(--red);color:var(--ivory);
  box-shadow:0 5px 0 #7E2820,0 8px 14px rgba(0,0,0,.4);
  transition:transform .08s, box-shadow .08s;
}
.go:active{transform:translateY(3px);box-shadow:0 2px 0 #7E2820,0 4px 8px rgba(0,0,0,.35)}
.go:focus-visible{outline:3px solid var(--gold);outline-offset:2px}
.err{grid-column:1/-1;color:#FFB3A9;font-size:13px;display:none}

/* 결과 */
#result{display:none;margin-top:40px}
.tile-stage{display:flex;justify-content:center;perspective:900px;margin-bottom:22px}
.big-tile{
  width:190px;height:250px;position:relative;
  transform-style:preserve-3d;
  animation:flip .9s cubic-bezier(.2,.7,.3,1) forwards;
}
@keyframes flip{
  0%{transform:rotateY(180deg) translateY(14px)}
  100%{transform:rotateY(0deg) translateY(0)}
}
@media (prefers-reduced-motion: reduce){
  .big-tile{animation:none}
}
/* html2canvas 캡처용: 3D 변환 제거 */
.capturing .big-tile{animation:none !important;transform:none !important}
.capturing .tile-face{backface-visibility:visible !important}
.capturing .tile-back{display:none !important}
.tile-face{
  position:absolute;inset:0;border-radius:16px;backface-visibility:hidden;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
}
.tile-front{
  background:linear-gradient(160deg,#FDFAF1 0%,var(--ivory) 60%,#EDE5D0 100%);
  box-shadow:0 9px 0 var(--ivory-side),0 16px 26px rgba(0,0,0,.45);
  color:var(--ink);
}
.tile-back{
  transform:rotateY(180deg);
  background:linear-gradient(160deg,#1E6B50,#144B38);
  box-shadow:0 9px 0 #0B3226,0 16px 26px rgba(0,0,0,.45);
}
.tile-code{
  font-family:'Black Han Sans',sans-serif;font-size:44px;letter-spacing:.06em;
  color:var(--red);
}
.tile-code span:nth-child(even){color:var(--green)}
.tile-label{font-size:12px;letter-spacing:.3em;color:var(--muted);margin-top:6px}
.type-name{
  text-align:center;font-family:'Black Han Sans',sans-serif;font-weight:400;
  font-size:clamp(26px,7vw,34px);color:var(--gold);margin-bottom:10px;
}
.type-desc{
  text-align:center;font-size:15px;line-height:1.75;color:#E3EAE5;
  max-width:460px;margin:0 auto 14px;font-weight:700;
}
.type-desc-long{
  text-align:left;font-size:14px;line-height:1.85;color:#C6D4CC;
  max-width:460px;margin:0 auto 30px;
  background:rgba(0,0,0,.18);border-radius:10px;padding:14px 16px;
}
.result-btns{display:flex;gap:10px;justify-content:center;margin-top:34px;flex-wrap:wrap}
.save-img{
  padding:11px 26px;border-radius:8px;border:none;cursor:pointer;
  background:var(--gold);color:var(--felt-deep);
  font-family:'IBM Plex Sans KR',sans-serif;font-size:14px;font-weight:700;
}
.save-img:focus-visible{outline:3px solid var(--ivory);outline-offset:2px}
.all-toggle{
  display:block;margin:26px auto 0;padding:10px 22px;border-radius:8px;cursor:pointer;
  border:1.5px solid rgba(247,242,229,.4);background:transparent;color:#CFDCD4;
  font-family:'IBM Plex Sans KR',sans-serif;font-size:13.5px;font-weight:700;
}
.all-toggle:focus-visible{outline:3px solid var(--gold);outline-offset:2px}
#allTypes{display:none;margin-top:18px}
#allTypes h3{
  font-family:'Black Han Sans',sans-serif;font-weight:400;font-size:20px;
  color:var(--gold);text-align:center;margin-bottom:14px;letter-spacing:.05em;
}
.type-list{display:flex;flex-direction:column;gap:8px}
.type-item{
  background:rgba(0,0,0,.22);border-radius:8px;padding:10px 13px;
  display:flex;align-items:baseline;gap:10px;
}
.type-item .code{
  font-family:'Black Han Sans',sans-serif;font-size:14px;letter-spacing:.05em;
  color:var(--gold);flex-shrink:0;width:64px;
}
.type-item .body{font-size:13px;line-height:1.55;color:#D8E2DC}
.type-item .body b{color:var(--ivory);margin-right:6px}

/* 축 게이지 */
.axes{display:flex;flex-direction:column;gap:16px}
.axis{background:rgba(0,0,0,.22);border-radius:10px;padding:12px 14px}
.axis .names{display:flex;justify-content:space-between;font-size:13px;font-weight:700;margin-bottom:8px}
.axis .names .win{color:var(--gold)}
.bar{position:relative;height:8px;border-radius:4px;background:rgba(247,242,229,.18)}
.bar .dot{
  position:absolute;top:50%;transform:translate(-50%,-50%);
  width:18px;height:18px;border-radius:50%;
  background:var(--ivory);border:3px solid var(--red);
  box-shadow:0 2px 5px rgba(0,0,0,.4);
}
.axis .why{font-size:11.5px;color:#A9BCB2;margin-top:7px}
.again{
  display:block;margin:34px auto 0;padding:11px 26px;border-radius:8px;border:1.5px solid var(--gold);
  background:transparent;color:var(--gold);font-family:'IBM Plex Sans KR',sans-serif;
  font-size:14px;font-weight:700;cursor:pointer;
}
.again:focus-visible{outline:3px solid var(--gold);outline-offset:2px}
footer{margin-top:44px;text-align:center;font-size:11.5px;color:#6E8279;line-height:1.7}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow">JAKHON STYLE REPORT</div>
    <h1>작혼 타패성향<br><span class="accent">32유형</span> 분석기</h1>
    <p class="sub">스탯 화면의 숫자 몇 개면 됩니다.<br>당신의 마작은 어떤 얼굴을 하고 있을까요?</p>
  </header>

  <div class="mode" role="group" aria-label="대국 모드">
    <button type="button" id="modeTon" class="on">동풍전</button>
    <button type="button" id="modeHan">반장전</button>
  </div>

  <form id="form" autocomplete="off">
    <div class="field">
      <label for="horyu">화료율</label>
      <div class="row"><input id="horyu" type="number" step="0.01" inputmode="decimal" placeholder="21.5"><span class="unit">%</span></div>
    </div>
    <div class="field">
      <label for="hoju">방총률</label>
      <div class="row"><input id="hoju" type="number" step="0.01" inputmode="decimal" placeholder="13.2"><span class="unit">%</span></div>
    </div>
    <div class="field">
      <label for="riichi">리치율</label>
      <div class="row"><input id="riichi" type="number" step="0.01" inputmode="decimal" placeholder="19.0"><span class="unit">%</span></div>
    </div>
    <div class="field">
      <label for="furo">후로율</label>
      <div class="row"><input id="furo" type="number" step="0.01" inputmode="decimal" placeholder="28.4"><span class="unit">%</span></div>
    </div>
    <div class="field">
      <label for="tobi">토비율</label>
      <div class="row"><input id="tobi" type="number" step="0.01" inputmode="decimal" placeholder="9.0"><span class="unit">%</span></div>
    </div>
    <div class="field">
      <label for="tajeom">평균 타점 <small>(화료 시)</small></label>
      <div class="row"><input id="tajeom" type="number" step="1" inputmode="numeric" placeholder="6200"><span class="unit">점</span></div>
    </div>
    <div class="field optional">
      <label for="junme">평균 화료 순목 <small>(선택)</small></label>
      <div class="row"><input id="junme" type="number" step="0.01" inputmode="decimal" placeholder="11.8"><span class="unit">순</span></div>
    </div>
    <div class="field optional">
      <label for="rank">평균 순위 <small>(선택)</small></label>
      <div class="row"><input id="rank" type="number" step="0.01" inputmode="decimal" placeholder="2.45"><span class="unit">위</span></div>
    </div>
    <p class="opt-note">※ 선택 항목은 비워도 됩니다. 있으면 판정이 조금 더 정밀해집니다.</p>
    <p class="err" id="err">필수 항목 6개(화료율·방총률·리치율·후로율·토비율·평균 타점)를 모두 입력해 주세요.</p>
    <button type="submit" class="go">패를 열어라</button>
  </form>

  <section id="result" aria-live="polite">
    <div id="captureCard">
      <div class="tile-stage">
        <div class="big-tile">
          <div class="tile-face tile-front">
            <div class="tile-code" id="codeOut"></div>
            <div class="tile-label">YOUR TILE</div>
          </div>
          <div class="tile-face tile-back"></div>
        </div>
      </div>
      <h2 class="type-name" id="nameOut"></h2>
      <p class="type-desc" id="descOut"></p>
      <p class="type-desc-long" id="descLongOut"></p>
      <div class="axes" id="axesOut"></div>
    </div>
    <div class="result-btns">
      <button type="button" class="save-img" id="saveBtn">이미지로 저장</button>
      <button type="button" class="again" id="againBtn" style="margin:0">다시 분석하기</button>
    </div>
  </section>

  <button type="button" class="all-toggle" id="allToggle" style="display:none">32유형 전체 보기 ▾</button>
  <section id="allTypes">
    <h3>전체 유형 도감</h3>
    <div class="type-list" id="typeList"></div>
  </section>

  <footer>
    실력 판정이 아니라 <b>성향 분류</b>입니다. 재미로 봐 주세요.<br>
    기준선은 작혼 커뮤니티 평균 통계를 참고해 잡았습니다.
  </footer>
</div>

<script>
/* ===== 유형 데이터 =====
   코드 5글자: [공A/수D][멘M/후C][리R/다T][안S/변V][속Q/화P] */
const TYPES = {
  AMRSQ:["속전속결 검객","최속 리치로 베고 빠지는, 낭비 제로의 정석 공격수.","멘젠으로 조용히 칼을 갈다가 텐파이 즉시 리치, 깔끔하게 한 판을 끝내고 다음 판으로 넘어간다. 공격적인데도 순위가 안정적인 건 쓸데없는 싸움에 끼지 않기 때문. 다만 상대 입장에선 리치가 곧 예고장이라, 가끔은 다마로 허를 찔러보는 것도 좋은 무기가 된다."],
  AMRSP:["리치봉 야포","리치 선언이 곧 포격 개시. 한 발이 크고 묵직한 포병.","서두르지 않고 도라와 타점을 실은 뒤에야 리치봉을 던진다. 리치가 걸리면 탁자 전체가 긴장하는 타입으로, 안정적인 운영 위에 화력을 얹은 이상적인 조합. 약점이 있다면 장전이 길어지는 판에서 기회를 통째로 흘려보낼 수 있다는 것."],
  AMRVQ:["폭주 리치 바이커","텐파이=리치. 브레이크는 출고 때 뺀 스피드광.","고민은 배송만 늦출 뿐이라는 신념으로 일단 리치부터 건다. 잘 풀리는 날엔 연속 화료로 탁자를 지배하지만, 안 풀리는 날엔 방총과 토비가 세트로 온다. 순위 그래프가 심전도처럼 뛰는 건 기본 옵션. 그래도 이 스타일이 제일 재밌다는 건 부정할 수 없다."],
  AMRVP:["올인 도박사","대승 아니면 토비. 중간이란 단어는 사전에서 지웠다.","싸구려 텐파이는 텐파이로 치지 않는다. 도라를 끌어안고 하네만 이상을 노리다 보니 터지면 크게 터지고, 막히면 점봉이 증발한다. 마작을 순위 게임이 아니라 한탕 게임으로 즐기는 낭만파. 점수 그래프는 괴로워도 하이라이트 영상은 제일 화려하다."],
  AMTSQ:["소리 없는 소매치기","리치 선언 없이 슬쩍슬쩍, 조용한 흑자 전문.","선언 없이 완성하고 선언 없이 오른다. 상대가 경계할 틈을 주지 않기 때문에 싸게 여러 번 챙기는 데 최적화된 스타일. 화려한 맛은 없지만 정산 화면에서 웃는 건 늘 이쪽이다. 가끔 리치를 섞어주면 다마의 위력이 배가된다."],
  AMTSP:["다마텐 암살자","조용히 큰 손을 숨기고 기다리는 침묵의 론.","리치봉을 아끼는 게 아니라 정보를 아끼는 것이다. 큰 손일수록 조용히 숨겨두고, 상대가 안심하고 내민 패에 론을 꽂는다. 성공했을 때의 짜릿함은 역만 다음가는 수준. 다만 쯔모 운이 없는 날엔 그 큰 손이 유국과 함께 증발하기도 한다."],
  AMTVQ:["잭 인 더 박스","어디서 튀어나올지 본인도 모르는 예측불가 상자.","다마로 숨었다가 갑자기 튀어나오는데, 그 타이밍이 매판 다르다. 상대도 못 읽지만 사실 본인도 계획이 없다. 그 즉흥성이 잘 맞물린 날엔 무적이고, 어긋난 날엔 순위표 바닥에서 상자째 굴러다닌다. 최대의 무기이자 최대의 리스크."],
  AMTVP:["지뢰 매설 전문가","판 곳곳에 심어둔 고타점 지뢰. 밟히면 대참사.","조용히, 그러나 크게. 다마로 숨긴 손이 죄다 만관 이상이라 상대가 한 번 밟으면 판세가 통째로 뒤집힌다. 문제는 아무도 안 밟아주는 날. 지뢰만 묻다가 유국을 반복하면 결국 자기 진지가 먼저 무너진다. 가끔은 리치로 위치를 광고하는 것도 전략."],
  ACRSQ:["이도류 검사","울기도 리치도 자유자재, 무기를 바꿔 드는 실용주의.","멘젠에 집착하지도, 후로에 의존하지도 않는다. 배패를 보고 그날의 무기를 고르는 유연함이 최대 강점. 안정적으로 공격을 이어가는 균형 잡힌 스타일이라 어느 탁에 가도 밥값은 한다. 대신 뾰족한 개성이 없다는 게 유일한 고민."],
  ACRSP:["중장비 기사","울어서 자재 모으고 리치로 못을 박는 중화력 건설러.","퐁·치로 도라 주변을 차곡차곡 쌓다가, 멘젠이 살아 있으면 리치로 마무리 타격을 넣는다. 겉보기엔 느긋한데 완성된 손은 늘 묵직한 타입. 공사가 길어지는 판에서 수비 전환 타이밍만 잡으면 한층 더 무서워진다."],
  ACRVQ:["뒷골목 싸움꾼","먼저 때리는 놈이 이긴다. 룰은 그것뿐.","울든 리치든 수단을 가리지 않고 최속으로 덤벼든다. 기세를 타면 아무도 못 말리는데, 기세가 꺾이면 방어라는 개념이 없어서 그대로 얻어맞는다. 순위는 하늘에 맡기고 오늘도 선빵을 노린다. 접는 법 하나만 배우면 진짜 강자가 된다."],
  ACRVP:["해적 선장","보이는 보물은 다 줍고, 큰 배는 들이받는다.","도라가 보이면 일단 울어서 확보, 승부처다 싶으면 전 재산을 실어 돌격한다. 대승과 침몰을 오가는 항해라 순위 그래프는 멀미가 나지만 본인은 지도에 없는 바다를 즐기는 중. 침몰도 항해의 일부라는 게 선장의 지론이다."],
  ACTSQ:["번개 배달부","퐁·치 최단 루트, 싸고 빠른 다회전 배달.","1000점도 화료는 화료. 최단 루트로 조립해 상대의 진행을 끊고 판을 굴리는 회전율 특화형이다. 큰 손은 못 만들어도 흐름을 쥐고 있는 건 늘 이쪽. 타점 욕심을 딱 한 스푼만 추가하면 성적이 한 단계 뛴다."],
  ACTSP:["노점의 큰손","소박하게 우는 척, 계산서는 묵직한 장사꾼.","후로해서 싸 보이는데 열어보면 도라가 잔뜩. 상대가 방심하고 던진 패로 조용히 큰 장사를 한다. 리치 없이도 타점을 뽑아내는 감각이 훌륭한 타입. 장사가 안 풀리는 날엔 무리하지 않고 일찍 문 닫는 것까지 완벽하다."],
  ACTVQ:["메뚜기 용병","이 판 저 판 튀어다니며 먹을 것만 챙기는 떠돌이.","정해진 스타일이 없다는 게 스타일. 판세가 좋으면 순식간에 울어서 먹고 빠지고, 아니다 싶으면 미련 없이 다음 들판으로 넘어간다. 생존 감각은 좋은데 변동이 커서, 일관된 판단 기준 하나만 세우면 무서워질 타입."],
  ACTVP:["화산 관리인","평소엔 조용한 울음, 어느 날 갑자기 대분화.","싸게 우는 척하다가 어느 판 갑자기 도라 범벅의 대형 화료를 터뜨린다. 분화 주기는 본인도 모른다는 게 함정. 터지는 날엔 1위 독주, 잠잠한 날엔 존재감이 없다. 분화 조건을 스스로 정해두면 관리가 훨씬 쉬워진다."],
  DMRSQ:["신중한 저격수","확신이 설 때만 당기는 방아쇠, 빗나감이 드물다.","판을 깊게 읽고, 이길 수 있는 판에서만 리치를 건다. 그래서 리치의 신뢰도가 높고 방총은 적은 저위험 고효율 스타일. 다만 신중함이 지나치면 기회 자체가 줄어드니, 가끔은 확신 80%에서도 쏘는 연습이 필요하다."],
  DMRSP:["요새의 포탑","성벽 안에서 조립, 완성되면 대포 발사.","평소엔 수비적으로 웅크리고 있어 존재감이 없다가, 손이 완성되는 순간 고타점 리치로 존재를 증명한다. 수비형 중 가장 맞으면 아픈 타입. 포탑이 완성되기 전에 판이 끝나는 게 유일한 고민이니, 가끔은 성문 밖 속공도 섞어보자."],
  DMRVQ:["소심한 번지점퍼","돌다리 두드리다 갑자기 리치로 점프.","평소엔 조심조심 접으면서 치는데, 무언가에 홀린 듯 갑자기 리치를 지른다. 그 낙차 때문에 순위가 널을 뛰는 타입. 점프 자체는 나쁘지 않으니, 뛰기 전에 줄 상태(대기 패의 매수)를 확인하는 습관만 들이면 안정형으로 진화할 수 있다."],
  DMRVP:["은둔 고수 지망생","조용히 웅크리다 큰 거 한 방을 노리는 잠룡.","대부분의 판은 접고 흘려보내다가, 진짜 손이 들어온 판에만 전력을 쏟는다. 성공하면 그날의 전설, 실패하면 그냥 조용했던 사람. 한 방 의존도가 높아 기복이 크니, 중간 크기 손도 챙기기 시작하면 '지망생' 딱지를 뗄 수 있다."],
  DMTSQ:["그림자 회계사","화려함 제로, 수지는 플러스. 장부의 달인.","리치도 잘 안 걸고 울지도 않는데 정산해 보면 흑자다. 위험한 판은 정확히 피하고, 이길 판만 조용히 챙기는 효율의 화신. 하이라이트 영상은 없지만 등급 포인트 그래프는 우상향. 마작을 게임이 아니라 자산 운용으로 하는 타입이다."],
  DMTSP:["명상하는 스나이퍼","대부분은 호흡 조절, 방아쇠는 인생에 몇 번.","참을성이 스탯의 절반이다. 조용히 접고 기다리다 확실한 큰 손에서만 다마로 저격한다. 그 한 발이 그날 게임의 하이라이트가 되는 타입. 다만 기다림이 길어지면 점수가 먼저 마르니, 저격 기준을 반 단계만 낮추면 밸런스가 잡힌다."],
  DMTVQ:["길 잃은 닌자","은신술은 만렙, 목적지는 매판 미정.","조용히 숨어서 치는 것까지는 완벽한데, 그날그날 목표가 달라서 결과도 널을 뛴다. 수비 감각이 있는데도 변동이 크다는 건 판단 기준이 아직 유동적이라는 뜻. 판이 시작될 때 이번 판의 임무를 정하는 습관이 생기면 진짜 닌자가 된다."],
  DMTVP:["로또 수도승","무소유로 접고 접다, 가끔 꾸는 대박의 꿈.","평소엔 세속의 싸움을 떠나 조용히 접으며 살지만, 마음 한구석엔 늘 역만의 꿈이 있다. 그 꿈이 이뤄지는 날은 일 년에 며칠. 나머지 날의 점수를 지키는 게 진짜 수행이다. 작은 화료도 공덕이라는 걸 받아들이면 해탈(승급)이 가까워진다."],
  DCRSQ:["실속형 편의점주","울어서 싸게 완성, 위험하면 셔터 내림.","마진은 작아도 회전과 안전으로 승부한다. 후로로 빠르게 완성하되 위험 신호가 오면 미련 없이 접는 운영이 몸에 배어 있다. 폐업(토비) 걱정 없는 견실 경영이 강점. 가끔 들어오는 대형 손님(좋은 배패)만 놓치지 않으면 완성형이다."],
  DCRSP:["신중한 채굴꾼","안전한 광맥만 파다, 금맥이면 리치 시추.","평소엔 울어서 안전하고 확실한 손만 파는데, 진짜 금맥이 보이면 그때만큼은 리치로 시추기를 꽂는다. 리스크 관리와 화력을 함께 갖춘 우량 광산. 금맥을 판별하는 눈만 더 기르면 채굴량이 꾸준히 늘어난다."],
  DCRVQ:["우유부단 검객","울까 접을까 고민 끝에, 결국 리치.","매 순간 진지하게 고민하는데 결론이 매판 다르다. 그 유연함이 잘 맞으면 상대가 읽지 못하는 검이 되고, 어긋나면 이도 저도 아닌 채 베인다. 고민의 방향 자체는 옳으니, 자기만의 판단 기준표를 하나 만들면 '우유부단'이 '임기응변'으로 승격된다."],
  DCRVP:["폭풍 속 낚시꾼","잔잔하면 수비, 폭풍 오면 월척 사냥.","평소엔 얌전히 접다가 큰 판의 냄새를 맡으면 리치를 들고 출항한다. 월척을 낚는 날엔 그 한 판으로 순위가 정리되지만, 배가 뒤집히는 날도 있어 그래프는 파도 모양. 출항 기준(도라 몇 개부터 승부할지)만 정해두면 조난이 확 줄어든다."],
  DCTSQ:["연금 생활자","작게, 확실하게, 꾸준하게. 매판 따박따박.","화려한 역만의 꿈보다 확실한 1000점이 좋다. 울어서 빠르게, 위험은 회피, 유국이면 텐파이료라도 챙긴다. 이 견실함이 쌓여 순위를 만든다. 남들이 지루하다고 해도 등급전은 결국 마라톤이라는 걸 아는 타입. 가끔 도라 보너스만 챙기면 완벽하다."],
  DCTSP:["전당포 주인","평소엔 셔터 닫힘, 확실한 물건만 조용히 크게.","함부로 문을 열지 않는다. 울어서 손을 만들 때도 타점이 보장된 물건만 받고, 아니다 싶으면 거래 자체를 하지 않는다. 다마로 조용히 받아내는 큰 거래가 특기. 패 읽기에 실수가 없는 게 최대 자산이라, 신용(점수)이 마를 일이 드물다."],
  DCTVQ:["눈치 백단 하이에나","판세 따라 붙었다 떨어졌다, 생존력 최상급.","강자들이 싸울 땐 조용히 빠져 있다가 빈틈이 보이면 순식간에 울어서 챙겨간다. 우아하진 않아도 살아남는 능력 하나는 확실하다. 변동이 큰 건 남의 싸움에 운명을 맡기는 구조 탓이니, 가끔은 직접 사냥(선제 공격)에도 나서보자."],
  DCTVP:["겨울잠 자는 곰","시즌 내내 자다 깨어난 날 몰아서 포식.","대부분의 판을 접고 흘려보내는 동면형인데, 깨어난 판의 식사량(타점)이 어마어마하다. 문제는 기상 시간이 완전 랜덤이라는 것. 동면 중에 점수가 야금야금 깎이는 걸 버텨야 해서 그래프가 출렁인다. 알람(참전 기준)을 맞춰두면 포식 횟수가 늘어난다."]
};

/* ===== 축 정의 및 기준선 ===== */
const TH = {
  ton:{aggr:35.5, furo:32, riichi:20, tobi:8,  tajeom:6300, junme:10.5, rank:2.6},
  han:{aggr:34.5, furo:30, riichi:19, tobi:10, tajeom:6400, junme:11.5, rank:2.6}
};
let mode = 'ton';
let lastCode = '';

const AXES = [
  {l:'공격형 A', r:'수비형 D'},
  {l:'멘젠파 M', r:'후로파 C'},
  {l:'리치파 R', r:'다마파 T'},
  {l:'안정형 S', r:'변동형 V'},
  {l:'속공형 Q', r:'화력형 P'}
];

const $ = id => document.getElementById(id);

$('modeTon').addEventListener('click',()=>setMode('ton'));
$('modeHan').addEventListener('click',()=>setMode('han'));
function setMode(m){
  mode=m;
  $('modeTon').classList.toggle('on',m==='ton');
  $('modeHan').classList.toggle('on',m==='han');
}

function clamp(v,a,b){return Math.max(a,Math.min(b,v));}

$('form').addEventListener('submit',e=>{
  e.preventDefault();
  const v = k => { const x=$(k).value.trim(); return x===''?null:parseFloat(x); };
  const horyu=v('horyu'), hoju=v('hoju'), riichi=v('riichi'),
        furo=v('furo'), tobi=v('tobi'), tajeom=v('tajeom'),
        junme=v('junme'), rank=v('rank');
  const need=[horyu,hoju,riichi,furo,tobi,tajeom];
  if(need.some(x=>x===null||isNaN(x))){ $('err').style.display='block'; return; }
  $('err').style.display='none';
  const t=TH[mode];

  /* 축 1: 공격/수비 — 화료율+방총률(참가 지향도) */
  const aggrVal=horyu+hoju;
  const a1={letter:aggrVal>=t.aggr?'A':'D',
    lean:clamp(50-(aggrVal-t.aggr)*6,5,95),
    why:`화료율+방총률 ${aggrVal.toFixed(1)}% (기준 ${t.aggr}%)`};

  /* 축 2: 멘젠/후로 — 후로율 */
  const a2={letter:furo>=t.furo?'C':'M',
    lean:clamp(50+(furo-t.furo)*3,5,95),
    why:`후로율 ${furo.toFixed(1)}% (기준 ${t.furo}%)`};

  /* 축 3: 리치/다마 — 리치율 */
  const a3={letter:riichi>=t.riichi?'R':'T',
    lean:clamp(50-(riichi-t.riichi)*6,5,95),
    why:`리치율 ${riichi.toFixed(1)}% (기준 ${t.riichi}%)`};

  /* 축 4: 안정/변동 — 토비율 (+평균순위 보정) */
  let volScore=(tobi-t.tobi)*5;
  let why4=`토비율 ${tobi.toFixed(1)}% (기준 ${t.tobi}%)`;
  if(rank!==null&&!isNaN(rank)){
    volScore+=(rank-t.rank)*40;
    why4+=` · 평균순위 ${rank.toFixed(2)}위 보정`;
  }
  const a4={letter:volScore>=0?'V':'S',
    lean:clamp(50+volScore,5,95),
    why:why4};

  /* 축 5: 속공/화력 — 평균 타점 (+경계선에서 화료순 보정) */
  let powLetter=tajeom>=t.tajeom?'P':'Q';
  let powLean=clamp(50+(tajeom-t.tajeom)/30,5,95);
  let why5=`평균 타점 ${Math.round(tajeom)}점 (기준 ${t.tajeom}점)`;
  if(junme!==null&&!isNaN(junme)&&Math.abs(tajeom-t.tajeom)<300){
    powLetter=junme<=t.junme?'Q':'P';
    powLean=clamp(50+(junme-t.junme)*10,5,95);
    why5+=` · 경계선이라 화료순 ${junme}순으로 판정`;
  }
  const a5={letter:powLetter,lean:powLean,why:why5};

  const axes=[a1,a2,a3,a4,a5];
  const code=axes.map(a=>a.letter).join('');
  const [name,shortD,longD]=TYPES[code];
  lastCode=code;

  $('codeOut').innerHTML=code.split('').map(c=>`<span>${c}</span>`).join('');
  $('nameOut').textContent='「'+name+'」';
  $('descOut').textContent=shortD;
  $('descLongOut').textContent=longD;

  $('axesOut').innerHTML=axes.map((a,i)=>{
    const leftWin=a.lean<50;
    return `<div class="axis">
      <div class="names">
        <span class="${leftWin?'win':''}">${AXES[i].l}</span>
        <span class="${leftWin?'':'win'}">${AXES[i].r}</span>
      </div>
      <div class="bar"><div class="dot" style="left:${a.lean}%"></div></div>
      <div class="why">${a.why}</div>
    </div>`;
  }).join('');

  const tile=document.querySelector('.big-tile');
  tile.style.animation='none'; void tile.offsetWidth; tile.style.animation='';

  $('result').style.display='block';
  $('allToggle').style.display='block';
  $('result').scrollIntoView({behavior:'smooth'});
});

$('againBtn').addEventListener('click',()=>{
  $('result').style.display='none';
  $('allToggle').style.display='none';
  $('allTypes').style.display='none';
  $('allToggle').textContent='32유형 전체 보기 ▾';
  window.scrollTo({top:0,behavior:'smooth'});
});

/* 이미지로 저장 */
$('saveBtn').addEventListener('click',async()=>{
  const btn=$('saveBtn');
  btn.disabled=true; btn.textContent='저장 중…';
  try{
    $('captureCard').classList.add('capturing');
    const canvas=await html2canvas($('captureCard'),{
      backgroundColor:'#123B2F',
      scale:2,
      useCORS:true
    });
    $('captureCard').classList.remove('capturing');
    canvas.toBlob(blob=>{
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');
      a.href=url;
      a.download='작혼유형_'+lastCode+'.png';
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(()=>URL.revokeObjectURL(url),3000);
    },'image/png');
  }catch(e){
    $('captureCard').classList.remove('capturing');
    alert('이미지 저장에 실패했습니다. 스크린샷을 이용해 주세요.');
  }finally{
    btn.disabled=false; btn.textContent='이미지로 저장';
  }
});

/* 32유형 전체 보기 */
let listBuilt=false;
$('allToggle').addEventListener('click',()=>{
  const box=$('allTypes');
  const open=box.style.display==='block';
  if(!open&&!listBuilt){
    $('typeList').innerHTML=Object.entries(TYPES).map(([c,[n,s]])=>
      `<div class="type-item"><span class="code">${c}</span><span class="body"><b>「${n}」</b>${s}</span></div>`
    ).join('');
    listBuilt=true;
  }
  box.style.display=open?'none':'block';
  $('allToggle').textContent=open?'32유형 전체 보기 ▾':'32유형 전체 보기 ▴';
});
</script>
</body>
</html>
